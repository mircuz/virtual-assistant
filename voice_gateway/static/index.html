<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Assistant</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0b10;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;align-items:center}
  .container{width:100%;max-width:480px;height:100vh;display:flex;flex-direction:column}
  .header{padding:14px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #1a1d2e}
  .header h1{font-size:16px;font-weight:600}
  .header select{background:#1a1d2e;border:none;color:#aaa;padding:4px 8px;border-radius:6px;font-size:12px;margin-left:auto}
  .transcript{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px}
  .bubble{padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.45;max-width:85%;animation:fadeIn .15s ease}
  .bubble.ai{background:#1a1d2e;align-self:flex-start;border-bottom-left-radius:4px}
  .bubble.user{background:#1e3a5f;align-self:flex-end;border-bottom-right-radius:4px}
  .bubble.sys{background:none;color:#555;font-size:12px;align-self:center}
  .call-area{padding:20px;display:flex;flex-direction:column;align-items:center;gap:14px;border-top:1px solid #1a1d2e}
  .voice-ring{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s}
  .voice-ring.idle{background:#1a3a1a;border:3px solid #22c55e}
  .voice-ring.listening{background:#1a2a4a;border:3px solid #3b82f6;animation:breathe 2s infinite}
  .voice-ring.processing{background:#2a2a1a;border:3px solid #f59e0b}
  .voice-ring.speaking{background:#1a1a3a;border:3px solid #8b5cf6;animation:pulse .8s infinite}
  .voice-ring.off{background:#2a1a1a;border:3px solid #ef4444}
  .voice-ring svg{width:32px;height:32px}
  .voice-label{font-size:12px;color:#666;letter-spacing:.5px}
  .vol-bar{width:180px;height:3px;background:#1a1d2e;border-radius:2px;overflow:hidden}
  .vol-bar .lv{height:100%;background:#3b82f6;width:0%;transition:width 50ms}
  .text-row{display:flex;gap:8px;width:100%;max-width:360px}
  .text-row input{flex:1;background:#1a1d2e;border:1px solid #2a2d3e;color:#e0e0e0;padding:8px 14px;border-radius:20px;font-size:13px;outline:none}
  .text-row input:focus{border-color:#3b82f6}
  .text-row button{background:#3b82f6;color:#fff;border:none;width:34px;height:34px;border-radius:50%;cursor:pointer}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
  @keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,.3)}50%{box-shadow:0 0 0 12px rgba(59,130,246,0)}}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(139,92,246,.3)}50%{box-shadow:0 0 0 10px rgba(139,92,246,0)}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Virtual Assistant</h1>
    <select id="shop">
      <option value="a0000000-0000-0000-0000-000000000001">Salon Bella</option>
      <option value="b0000000-0000-0000-0000-000000000002">Studio Hair</option>
    </select>
  </div>
  <div class="transcript" id="transcript"></div>
  <div class="call-area">
    <div class="voice-label" id="label">Tap to call</div>
    <div class="voice-ring idle" id="ring" onclick="toggleCall()">
      <svg id="icoPhone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      <svg id="icoMic" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
    </div>
    <div class="vol-bar" id="volBar" style="display:none"><div class="lv" id="volLv"></div></div>
    <div class="text-row">
      <input type="text" id="txtIn" placeholder="Or type here..." disabled onkeydown="if(event.key==='Enter')sendText()">
      <button id="sendBtn" disabled onclick="sendText()">&#10148;</button>
    </div>
  </div>
</div>

<script>
const API = location.origin;
let sid = null, state = 'idle', busy = false;
let mediaRecorder, audioChunks = [], stream = null;
let silenceTimer = null, analyser = null, animFrame = null;
let audioQueue = [], isPlaying = false, streamBubble = null;
const SILENCE_MS = 1500, SILENCE_THRESHOLD = 0.015;

function setState(s){
  state=s;
  document.getElementById('ring').className='voice-ring '+s;
  document.getElementById('icoPhone').style.display=(s==='idle'||s==='off')?'':'none';
  document.getElementById('icoMic').style.display=(s!=='idle'&&s!=='off')?'':'none';
  document.getElementById('volBar').style.display=s==='listening'?'':'none';
  const L={idle:'Tap to call',listening:'Listening...',processing:'Processing...',speaking:'Speaking...',off:'Call ended'};
  document.getElementById('label').textContent=L[s]||'';
  document.getElementById('txtIn').disabled=!sid||busy;
  document.getElementById('sendBtn').disabled=!sid||busy;
}

function addBubble(text,cls){
  const t=document.getElementById('transcript'),d=document.createElement('div');
  d.className='bubble '+cls; d.textContent=text;
  t.appendChild(d); t.scrollTop=t.scrollHeight; return d;
}

function queueAudio(b64){audioQueue.push(b64);if(!isPlaying)playNext();}
function playNext(){
  if(!audioQueue.length){isPlaying=false;return;}
  isPlaying=true;
  const b=atob(audioQueue.shift()),a=new Uint8Array(b.length);
  for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);
  const au=new Audio(URL.createObjectURL(new Blob([a],{type:'audio/wav'})));
  au.onended=playNext; au.onerror=playNext; au.play().catch(playNext);
}

// --- SSE streaming turn ---
async function streamTurn(payload){
  busy=true;
  setState('processing');
  streamBubble=null;
  try{
    const resp=await fetch(API+'/conversations/'+sid+'/stream',{
      method:'POST', credentials:'include',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload),
    });
    const reader=resp.body.getReader();
    const decoder=new TextDecoder();
    let buf='';
    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      buf+=decoder.decode(value,{stream:true});
      // Parse SSE events from buffer
      const parts=buf.split('\n\n');
      buf=parts.pop(); // keep incomplete
      for(const part of parts){
        let evName='message',evData='';
        for(const line of part.split('\n')){
          if(line.startsWith('event: '))evName=line.slice(7);
          else if(line.startsWith('data: '))evData=line.slice(6);
        }
        if(!evData)continue;
        const d=JSON.parse(evData);
        switch(evName){
          case 'transcript': addBubble(d.text,'user'); break;
          case 'status':
            if(d.status==='speaking')setState('speaking');
            else if(d.status==='thinking')setState('processing');
            break;
          case 'token':
            if(!streamBubble)streamBubble=addBubble('','ai');
            streamBubble.textContent+=d.text;
            document.getElementById('transcript').scrollTop=9e9;
            break;
          case 'audio': setState('speaking'); queueAudio(d.audio_base64); break;
          case 'turn_end': streamBubble=null; break;
          case 'error': addBubble('Error: '+d.message,'sys'); break;
        }
      }
    }
  }catch(e){addBubble('Error: '+e.message,'sys');}
  busy=false;
  // Wait for audio to finish, then listen
  awaitAudioThenListen();
}

function awaitAudioThenListen(){
  if(audioQueue.length||isPlaying){setTimeout(awaitAudioThenListen,200);return;}
  if(sid)startListening();
}

// --- Call lifecycle ---
async function toggleCall(){if(sid)endCall();else startCall();}

async function startCall(){
  document.getElementById('transcript').innerHTML='';
  setState('processing');
  try{
    const r=await fetch(API+'/conversations/start',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({shop_id:document.getElementById('shop').value,caller_phone:'+39test'})});
    const d=await r.json(); sid=d.session_id;
    addBubble(d.greeting_text,'ai');
    if(d.greeting_audio){setState('speaking');queueAudio(d.greeting_audio);awaitAudioThenListen();}
    else startListening();
  }catch(e){addBubble('Error: '+e.message,'sys');setState('idle');}
}

async function endCall(){
  stopListening(); audioQueue=[]; isPlaying=false;
  try{await fetch(API+'/conversations/'+sid,{method:'DELETE',credentials:'include'});}catch(e){}
  addBubble('Call ended','sys');sid=null;setState('off');
  setTimeout(()=>setState('idle'),2000);
}

function sendText(){
  const inp=document.getElementById('txtIn'),t=inp.value.trim();
  if(!t||!sid||busy)return; inp.value='';
  stopListening(); addBubble(t,'user');
  streamTurn({text:t});
}

// --- Mic + VAD ---
async function startListening(){
  if(!sid||busy)return;
  setState('listening');
  try{
    stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});
    const ctx=new AudioContext(),src=ctx.createMediaStreamSource(stream);
    analyser=ctx.createAnalyser();analyser.fftSize=512;src.connect(analyser);monitorVol();
    audioChunks=[];
    mediaRecorder=new MediaRecorder(stream,{mimeType:'audio/webm'});
    mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);
    mediaRecorder.onstop=()=>{
      if(!audioChunks.length)return;
      const blob=new Blob(audioChunks,{type:'audio/webm'});
      const reader=new FileReader();
      reader.onloadend=()=>{
        const b64=reader.result.split(',')[1];
        streamTurn({audio_base64:b64});
      };
      reader.readAsDataURL(blob);
    };
    mediaRecorder.start();resetSilence();
  }catch(e){addBubble('Mic unavailable','sys');}
}

function stopListening(){
  clearTimeout(silenceTimer);cancelAnimationFrame(animFrame);
  if(mediaRecorder&&mediaRecorder.state!=='inactive')try{mediaRecorder.stop();}catch(e){}
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  analyser=null;
}

function monitorVol(){
  if(!analyser||state!=='listening')return;
  const d=new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(d);
  let s=0;for(let i=0;i<d.length;i++)s+=d[i]*d[i];
  const rms=Math.sqrt(s/d.length);
  document.getElementById('volLv').style.width=Math.min(100,rms*500)+'%';
  if(rms>SILENCE_THRESHOLD)resetSilence();
  animFrame=requestAnimationFrame(monitorVol);
}

function resetSilence(){
  clearTimeout(silenceTimer);
  silenceTimer=setTimeout(()=>{
    if(state==='listening'&&mediaRecorder&&mediaRecorder.state==='recording'){
      mediaRecorder.stop();
      if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
    }
  },SILENCE_MS);
}
</script>
</body>
</html>
