<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Assistant</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0b10;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;align-items:center}
  .container{width:100%;max-width:480px;height:100vh;display:flex;flex-direction:column}
  .header{padding:14px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #1a1d2e}
  .header h1{font-size:16px;font-weight:600}
  .header select{background:#1a1d2e;border:none;color:#aaa;padding:4px 8px;border-radius:6px;font-size:12px;margin-left:auto}
  .transcript{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px}
  .bubble{padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.45;max-width:85%;animation:fadeIn .15s ease}
  .bubble.ai{background:#1a1d2e;align-self:flex-start;border-bottom-left-radius:4px}
  .bubble.user{background:#1e3a5f;align-self:flex-end;border-bottom-right-radius:4px}
  .bubble.sys{background:none;color:#555;font-size:12px;align-self:center}
  .call-area{padding:20px;display:flex;flex-direction:column;align-items:center;gap:14px;border-top:1px solid #1a1d2e}
  .voice-ring{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s}
  .voice-ring.idle{background:#1a3a1a;border:3px solid #22c55e}
  .voice-ring.connecting{background:#2a2a1a;border:3px solid #f59e0b;animation:pulse .8s infinite}
  .voice-ring.active{background:#1a2a4a;border:3px solid #3b82f6;animation:breathe 2s infinite}
  .voice-ring.off{background:#2a1a1a;border:3px solid #ef4444}
  .voice-ring svg{width:32px;height:32px}
  .voice-label{font-size:12px;color:#666;letter-spacing:.5px}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
  @keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,.3)}50%{box-shadow:0 0 0 12px rgba(59,130,246,0)}}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.3)}50%{box-shadow:0 0 0 10px rgba(245,158,11,0)}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Virtual Assistant</h1>
    <select id="shop">
      <option value="a0000000-0000-0000-0000-000000000001">Salon Bella</option>
      <option value="b0000000-0000-0000-0000-000000000002">Studio Hair</option>
    </select>
  </div>
  <div class="transcript" id="transcript"></div>
  <div class="call-area">
    <div class="voice-label" id="label">Tap to call</div>
    <div class="voice-ring idle" id="ring" onclick="toggleCall()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
    </div>
    <div class="voice-label" id="status"></div>
  </div>
</div>

<script>
const API = location.origin;
let pc = null, dc = null, state = 'idle';
let currentBubble = null;
let shopData = null;

function setState(s) {
  state = s;
  const ring = document.getElementById('ring');
  ring.className = 'voice-ring ' + s;
  const labels = {idle:'Tap to call', connecting:'Connecting...', active:'In call', off:'Call ended'};
  document.getElementById('label').textContent = labels[s] || '';
}

function setStatus(text) {
  document.getElementById('status').textContent = text;
}

function addBubble(text, cls) {
  const t = document.getElementById('transcript');
  const d = document.createElement('div');
  d.className = 'bubble ' + cls;
  d.textContent = text;
  t.appendChild(d);
  t.scrollTop = t.scrollHeight;
  return d;
}

async function toggleCall() {
  if (state === 'active' || state === 'connecting') { endCall(); return; }
  startCall();
}

async function startCall() {
  document.getElementById('transcript').innerHTML = '';
  setState('connecting');
  setStatus('Requesting token...');

  try {
    // 1. Get ephemeral token from our server
    const shopId = document.getElementById('shop').value;
    const tokenResp = await fetch(`${API}/api/v1/realtime/token?shop_id=${shopId}`, {
      method: 'POST', credentials: 'include',
    });
    const tokenData = await tokenResp.json();
    if (tokenData.error) throw new Error(tokenData.error);

    shopData = tokenData;
    const ephemeralToken = tokenData.token;

    setStatus('Connecting WebRTC...');

    // 2. Create WebRTC peer connection
    pc = new RTCPeerConnection();

    // 3. Set up audio output (assistant voice)
    const audioEl = document.createElement('audio');
    audioEl.autoplay = true;
    pc.ontrack = (e) => { audioEl.srcObject = e.streams[0]; };

    // 4. Get microphone and add track
    const ms = await navigator.mediaDevices.getUserMedia({ audio: true });
    pc.addTrack(ms.getTracks()[0]);

    // 5. Set up data channel for events
    dc = pc.createDataChannel('oai-events');
    dc.onopen = () => {
      setState('active');
      setStatus('');
      // Make the assistant speak the welcome message
      dc.send(JSON.stringify({
        type: 'conversation.item.create',
        item: {
          type: 'message',
          role: 'user',
          content: [{ type: 'input_text', text: '[Il cliente ha appena chiamato. Salutalo con il messaggio di benvenuto del salone.]' }],
        },
      }));
      dc.send(JSON.stringify({ type: 'response.create' }));
    };
    dc.onmessage = handleRealtimeEvent;
    dc.onclose = () => { if (state === 'active') endCall(); };

    // 6. Create SDP offer
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    // 7. Send offer to OpenAI Realtime API
    const sdpResp = await fetch('https://api.openai.com/v1/realtime?model=gpt-4o-mini-realtime-preview-2024-12-17', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${ephemeralToken}`,
        'Content-Type': 'application/sdp',
      },
      body: offer.sdp,
    });

    const answerSdp = await sdpResp.text();
    await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });

  } catch (e) {
    addBubble('Error: ' + e.message, 'sys');
    setState('idle');
    setStatus('');
  }
}

function endCall() {
  if (pc) { pc.close(); pc = null; }
  dc = null;
  addBubble('Chiamata terminata', 'sys');
  setState('off');
  setStatus('');
  setTimeout(() => setState('idle'), 2000);
}

function handleRealtimeEvent(event) {
  const msg = JSON.parse(event.data);

  switch (msg.type) {
    // User speech transcription
    case 'conversation.item.input_audio_transcription.completed':
      addBubble(msg.transcript || '(audio)', 'user');
      break;

    // Assistant response text (streaming)
    case 'response.audio_transcript.delta':
      if (!currentBubble) currentBubble = addBubble('', 'ai');
      currentBubble.textContent += msg.delta;
      document.getElementById('transcript').scrollTop = 9e9;
      break;

    case 'response.audio_transcript.done':
      currentBubble = null;
      break;

    // Function call from the model
    case 'response.function_call_arguments.done':
      handleFunctionCall(msg);
      break;

    // Errors
    case 'error':
      addBubble('Error: ' + (msg.error?.message || JSON.stringify(msg.error)), 'sys');
      break;

    case 'response.done':
      // Check if there was an end-of-conversation signal
      break;
  }
}

async function handleFunctionCall(msg) {
  const name = msg.name;
  const args = JSON.parse(msg.arguments || '{}');
  const callId = msg.call_id;

  setStatus(`${name}...`);
  let result = {};

  try {
    // Route ALL function calls through our gateway server (it has booking engine auth)
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 15000); // 15s timeout
    const resp = await fetch(`${API}/api/v1/realtime/action`, {
      method: 'POST',
      credentials: 'include',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        shop_id: shopData.shop.id,
        function_name: name,
        arguments: args,
      }),
      signal: controller.signal,
    });
    clearTimeout(timeout);
    result = await resp.json();
    console.log(`Function ${name} result:`, result);
  } catch (e) {
    console.error(`Function ${name} error:`, e);
    result = { error: e.message || 'Timeout o errore di connessione' };
  }

  setStatus('');

  // Send function result back to the Realtime API via data channel
  dc.send(JSON.stringify({
    type: 'conversation.item.create',
    item: {
      type: 'function_call_output',
      call_id: callId,
      output: JSON.stringify(result),
    },
  }));

  // Resume the conversation
  dc.send(JSON.stringify({ type: 'response.create' }));
}
</script>
</body>
</html>
